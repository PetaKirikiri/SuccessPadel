      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Slab:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, shrink-to-fit=no"
    />
    <script>
      ;(function () {
        try {
          if (localStorage.getItem('sp-theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <script>
      ;(function () {
        var TV_MIN = 1536
        var isTvKiosk =
          /^\/competitions\/[^/]+$/.test(location.pathname) &&
          window.matchMedia('(min-width: ' + TV_MIN + 'px)').matches
        if (isTvKiosk) document.documentElement.setAttribute('data-tv-kiosk', '')

        function hide(el) {
          if (!el || el.id === 'root' || el === document.body || el === document.documentElement) return
          el.style.setProperty('display', 'none', 'important')
          el.style.setProperty('visibility', 'hidden', 'important')
          el.style.setProperty('pointer-events', 'none', 'important')
        }
        function isToolbar(el) {
          if (!el || el.nodeType !== 1) return false
          if (el.tagName === 'IFRAME') {
            var src = el.src || ''
            return src.indexOf('vercel.live') !== -1 || src.indexOf('vercel.com/_toolbar') !== -1
          }
          if (/^vercel-/i.test(el.tagName)) return true
          if (el.id === 'vercel-toolbar' || el.id === '__vercel-toolbar') return true
          return el.hasAttribute && el.hasAttribute('data-vercel-toolbar')
        }
        function run() {
          if (document.body && isTvKiosk) {
            Array.prototype.slice.call(document.body.children).forEach(function (child) {
              if (child.id !== 'root') hide(child)
            })
          }
          document.querySelectorAll('iframe, [data-vercel-toolbar], #vercel-toolbar, #__vercel-toolbar').forEach(function (el) {
            if (isToolbar(el)) {
              hide(el)
              var parent = el.parentElement
              if (parent && isToolbar(parent)) hide(parent)
            }
          })
        }
        run()
        new MutationObserver(run).observe(document.documentElement, { childList: true, subtree: true })
        window.setInterval(run, 1500)
      })()
    </script>
    <script>
      ;(function () {
        function lockWidth() {
          var w = (window.visualViewport && window.visualViewport.width) || window.innerWidth
          var h = window.innerHeight
          var wpx = Math.round(w) + 'px'
          var hpx = Math.round(h) + 'px'
          var html = document.documentElement
          html.style.setProperty('--app-width', wpx)
          html.style.setProperty('--app-height', hpx)
          html.style.overflow = 'hidden'
          html.style.position = 'fixed'
          if (document.body) {
            document.body.style.overflow = 'hidden'
            document.body.style.position = 'fixed'
          }
        }
        lockWidth()
        window.addEventListener('resize', lockWidth)
        window.addEventListener('orientationchange', lockWidth)
      })()
    </script>
    <meta name="theme-color" content="#FDFAF5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Success Padel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
